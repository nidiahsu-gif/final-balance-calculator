<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>典華尾款試算表</title>
  <style>
    :root {
      --ink: #2f2926;
      --muted: #73665e;
      --line: #d5c8bf;
      --paper: #fffdf9;
      --panel: #fbf7f2;
      --brand: #b48263;
      --brand-dark: #7f5f50;
      --accent: #c8a06d;
      --warn: #d71920;
      --table-head: #ead8d5;
      --table-side: #f3dada;
      --shadow: 0 18px 42px rgba(83, 61, 48, .13);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(200, 160, 109, .16), transparent 26rem),
        linear-gradient(135deg, #fffaf4 0%, #f8f2ec 55%, #fffdf9 100%);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      max-width: 1360px;
      margin: 0 auto 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand img {
      width: 132px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
      font-weight: 700;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }

    .button.secondary {
      background: #fff;
      color: var(--brand-dark);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(340px, 460px) minmax(620px, 1fr);
      gap: 20px;
      max-width: 1360px;
      margin: 0 auto;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 249, .94);
      border: 1px solid rgba(181, 141, 113, .35);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form-panel {
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      overflow: auto;
    }

    .panel-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff 0%, #fbf5ef 100%);
      border-radius: 8px 8px 0 0;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .form {
      padding: 18px;
    }

    .section {
      padding: 0 0 18px;
      margin: 0 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      margin: 0 0 12px;
      color: var(--brand-dark);
      font-size: 15px;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(180, 130, 99, .16);
    }

    .rows {
      display: grid;
      gap: 8px;
    }

    .row-editor {
      display: grid;
      grid-template-columns: 1.3fr .72fr .62fr 58px 36px;
      gap: 8px;
      align-items: end;
    }

    .check-field {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      padding: 0 8px;
      white-space: nowrap;
    }

    .check-field input {
      width: 16px;
      min-height: 16px;
      padding: 0;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .checkbox-group .check-field {
      justify-content: flex-start;
    }

    .icon-button {
      width: 36px;
      height: 38px;
      border: 1px solid #d9c8bb;
      border-radius: 6px;
      background: #fff;
      color: var(--brand-dark);
      cursor: pointer;
      font-weight: 900;
    }

    .add-row {
      width: 100%;
      margin-top: 10px;
    }

    .preview-panel {
      padding: 18px;
      overflow: auto;
    }

    .sheet {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #222;
      color: #000;
    }

    .sheet-brand {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 16px 6px;
      min-height: 58px;
    }

    .sheet-brand img {
      width: 128px;
      height: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 14px;
      line-height: 1.35;
    }

    th, td {
      border: 1px solid #222;
      padding: 7px 8px;
      vertical-align: middle;
      word-break: break-word;
    }

    .sheet-title {
      background: #fee3c6;
      font-weight: 800;
      text-align: center;
      font-size: 19px;
      line-height: 1.45;
    }

    .head {
      background: var(--table-head);
      text-align: center;
      font-weight: 800;
    }

    .side {
      background: var(--table-side);
      text-align: center;
      font-weight: 800;
      width: 88px;
      min-width: 88px;
      font-size: 15px;
      white-space: nowrap;
    }

    .center {
      text-align: center;
    }

    .right {
      text-align: right;
    }

    .red {
      color: var(--warn);
      font-weight: 800;
    }

    .subtotal-label {
      color: var(--warn);
      text-align: center;
      font-weight: 800;
    }

    .note-line {
      min-height: 32px;
      border-bottom: 1px solid #b9cbe6;
      padding: 7px 8px;
    }

    .signature {
      height: 88px;
      vertical-align: top;
    }

    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100%;
      min-height: 74px;
    }

    .signature-left {
      border-right: 1px solid #222;
      padding: 8px;
    }

    .signature-right {
      padding: 8px;
      position: relative;
    }

    .date-mark {
      position: absolute;
      right: 28px;
      bottom: 8px;
      letter-spacing: 20px;
    }

    .empty-state {
      color: #777;
      text-align: center;
      padding: 16px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .form-panel {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      .app {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid,
      .row-editor {
        grid-template-columns: 1fr;
      }

      .row-editor .icon-button {
        width: 100%;
      }

      .preview-panel {
        padding: 10px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 6px 5px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .form-panel {
        display: none;
      }

      .app {
        padding: 0;
      }

      .layout {
        display: block;
        max-width: none;
      }

      .preview-panel {
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .sheet {
        max-width: none;
        width: 190mm;
        border: 1px solid #000;
        page-break-inside: avoid;
      }

      @page {
        size: A4 portrait;
        margin: 10mm;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img src="assets/dianhua-logo.png" alt="典華">
        <div>
          <h1>尾款試算表產生器</h1>
          <p class="subtitle">宴企快速輸入資料，即時產出婚宴／工商尾款試算表。</p>
        </div>
      </div>
      <div class="actions">
        <button class="button secondary" id="resetBtn" type="button">清空重填</button>
        <button class="button" id="printBtn" type="button">列印 / 另存 PDF</button>
      </div>
    </header>

    <div class="layout">
      <aside class="panel form-panel">
        <div class="panel-header">
          <h2>試算資料</h2>
        </div>
        <form class="form" id="calculatorForm">
          <section class="section">
            <h3 class="section-title">基本資訊</h3>
            <div class="grid">
              <label class="field">
                類型
                <select id="eventType">
                  <option value=""></option>
                  <option value="婚宴">婚宴</option>
                  <option value="工商">工商</option>
                  <option value="尾牙春酒" selected>尾牙春酒</option>
                  <option value="其他宴會">其他宴會</option>
                </select>
              </label>
              <label class="field">
                日期
                <input id="eventDate" type="date" value="2026-07-11">
              </label>
              <label class="field">
                時段
                <select id="mealPeriod">
                  <option value=""></option>
                  <option value="午宴" selected>午宴</option>
                  <option value="晚宴">晚宴</option>
                </select>
              </label>
              <label class="field">
                廳別
                <input id="hall" type="text" value="亞瑟廳">
              </label>
              <label class="field full">
                客戶／主題名稱
                <input id="clientName" type="text" value="張李府喜宴">
              </label>
              <label class="field">
                分館／館別
                <input id="branch" type="text" value="新莊典華" readonly>
              </label>
              <label class="field">
                訂金已支付
                <input id="deposit" type="number" min="0" step="1" value="24000">
              </label>
            </div>
          </section>

          <section class="section">
            <h3 class="section-title">桌餐與服務</h3>
            <div class="rows" id="mainRows"></div>
            <button class="button secondary add-row" type="button" data-add="main">新增項目</button>
          </section>

          <section class="section">
            <h3 class="section-title">其他費用</h3>
            <label class="check-field" style="justify-content:flex-start;margin-bottom:10px">
              <input id="showOtherFees" type="checkbox" checked>
              顯示其他費用
            </label>
            <div class="rows" id="otherRows"></div>
            <button class="button secondary add-row" type="button" data-add="other">新增其他費用</button>
          </section>

          <section class="section">
            <h3 class="section-title">其他加購</h3>
            <div class="rows" id="extraRows"></div>
            <button class="button secondary add-row" type="button" data-add="extra">新增加購</button>
          </section>

          <section class="section">
            <h3 class="section-title">付款與備註</h3>
            <div class="grid">
              <div class="field full">
                <label>付款方式</label>
                <div class="checkbox-group">
                  <label class="check-field"><input type="checkbox" name="payment" value="現金">現金</label>
                  <label class="check-field"><input type="checkbox" name="payment" value="刷卡">刷卡</label>
                  <label class="check-field"><input type="checkbox" name="payment" value="先簽帳一周內匯款" checked>先簽帳一周內匯款</label>
                </div>
              </div>
              <label class="field">
                服務費
                <select id="serviceMode">
                  <option value="included" selected>品項已含服務費</option>
                  <option value="tenPercent">另加 10%</option>
                  <option value="none">不計服務費</option>
                </select>
              </label>
              <label class="field full">
                說明文字
                <textarea id="notice">以上未達保證桌處理方式：需支付全額打包帶回</textarea>
              </label>
              <label class="field full">
                左下提醒
                <textarea id="footerNote">*上述僅為試算之費用，
不含當日另新增費用及酒水。</textarea>
              </label>
            </div>
          </section>
        </form>
      </aside>

      <section class="panel preview-panel" aria-label="尾款試算表預覽">
        <div class="sheet" id="sheet">
          <div class="sheet-brand">
            <img src="assets/dianhua-logo.png" alt="典華">
          </div>
          <table>
            <colgroup>
              <col style="width:88px">
              <col>
              <col style="width:16%">
              <col style="width:16%">
              <col style="width:22%">
            </colgroup>
            <tbody id="sheetBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const DRAFT_KEY = "dianhuaBalanceDraft.v2";

    function cloneState(source) {
      return JSON.parse(JSON.stringify(source));
    }

    const DEFAULT_STATE = {
      main: [
        { name: "葷桌單價", price: 11000, qty: 10 },
        { name: "素桌單價", price: 11000, qty: 2 },
        { name: "主桌加人加量加價", price: 1100, qty: 2 },
        { name: "客桌素食餐", price: 1100, qty: 2 },
        { name: "炒飯", price: 198, qty: 2 }
      ],
      other: [
        { name: "場租", price: 0, qty: 0 },
        { name: "舞臺", price: 3150, qty: 1 }
      ],
      extra: [
        { name: "金牌啤酒600ml每瓶NT$100+10%", price: 0, qty: 0 },
        { name: "海尼根650ml每瓶NT$120+10%", price: 0, qty: 0 },
        { name: "精選法國紅酒每瓶NT$500+10%", price: 0, qty: 0 },
        { name: "礦泉水330ml每瓶NT$30+10%", price: 0, qty: 0 }
      ]
    };

    const EMPTY_STATE = {
      main: [{ name: "", price: 0, qty: 0, comp: false }],
      other: [{ name: "", price: 0, qty: 0, comp: false }],
      extra: [{ name: "", price: 0, qty: 0, comp: false }]
    };

    let state = cloneState(DEFAULT_STATE);

    const fields = [
      "eventType", "eventDate", "mealPeriod", "hall", "clientName",
      "deposit", "serviceMode", "notice", "footerNote", "showOtherFees"
    ];

    const formatMoney = value => Number(value || 0).toLocaleString("zh-TW", {
      maximumFractionDigits: 0
    });

    const toDateText = value => {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return `${year}/${month}/${day}`;
    };

    const getValue = id => {
      const element = document.getElementById(id);
      return element.type === "checkbox" ? element.checked : element.value;
    };

    const setValue = (id, value) => {
      const element = document.getElementById(id);
      if (element.type === "checkbox") {
        element.checked = Boolean(value);
        return;
      }
      element.value = value;
    };

    const weekdayText = value => {
      if (!value) return "";
      const date = new Date(`${value}T00:00:00`);
      return ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
    };

    const paymentOptions = () => Array
      .from(document.querySelectorAll('input[name="payment"]'))
      .filter(input => input.checked)
      .map(input => input.value)
      .join("　");

    function createRowEditor(type, item, index) {
      const row = document.createElement("div");
      row.className = "row-editor";
      row.innerHTML = `
        <label class="field">
          品項
          <input type="text" value="${item.name}" data-type="${type}" data-index="${index}" data-key="name">
        </label>
        <label class="field">
          單價
          <input type="number" min="0" step="1" value="${item.price}" data-type="${type}" data-index="${index}" data-key="price">
        </label>
        <label class="field">
          數量
          <input type="number" min="0" step="1" value="${item.qty}" data-type="${type}" data-index="${index}" data-key="qty">
        </label>
        <label class="check-field">
          <input type="checkbox" ${item.comp ? "checked" : ""} data-type="${type}" data-index="${index}" data-key="comp">
          招待
        </label>
        <button class="icon-button" type="button" title="刪除此列" data-remove="${type}" data-index="${index}">×</button>
      `;
      return row;
    }

    function renderEditors() {
      document.getElementById("mainRows").replaceChildren(
        ...state.main.map((item, index) => createRowEditor("main", item, index))
      );
      document.getElementById("otherRows").replaceChildren(
        ...state.other.map((item, index) => createRowEditor("other", item, index))
      );
      document.getElementById("extraRows").replaceChildren(
        ...state.extra.map((item, index) => createRowEditor("extra", item, index))
      );
    }

    function visibleRows(type) {
      return state[type].filter(item => item.name.trim() || Number(item.price) || Number(item.qty));
    }

    function totalRows(rows) {
      return rows.reduce((sum, item) => {
        if (item.comp) return sum;
        return sum + Number(item.price || 0) * Number(item.qty || 0);
      }, 0);
    }

    function rowCells(item) {
      const subtotal = Number(item.price || 0) * Number(item.qty || 0);
      return `
        <td>${item.name || "&nbsp;"}</td>
        <td class="center">${formatMoney(item.price)}</td>
        <td class="center">${formatMoney(item.qty)}</td>
        <td class="right">${item.comp ? '<span class="red">招待</span>' : formatMoney(subtotal)}</td>
      `;
    }

    function rowHtml(item) {
      return `<tr>${rowCells(item)}</tr>`;
    }

    function sectionRows(label, rows, emptyText, includeNotice = false) {
      const visibleCount = Math.max(rows.length, 1) + (includeNotice ? 1 : 0);
      return `
        <tr>
          <td class="side" rowspan="${visibleCount}">${label}</td>
          ${rows.length ? rowCells(rows[0]) : `<td colspan="4" class="empty-state">${emptyText}</td>`}
        </tr>
        ${rows.slice(1).map(rowHtml).join("")}
        ${includeNotice ? `<tr><td class="red center" colspan="4">${getValue("notice")}</td></tr>` : ""}
      `;
    }

    function renderSheet() {
      const body = document.getElementById("sheetBody");
      const mainRows = visibleRows("main");
      const otherRows = getValue("showOtherFees") ? visibleRows("other") : [];
      const extraRows = visibleRows("extra");
      const mainTotal = totalRows(mainRows);
      const otherTotal = totalRows(otherRows);
      const extraTotal = totalRows(extraRows);
      const deposit = Number(getValue("deposit") || 0);
      const serviceMode = getValue("serviceMode");
      const beforeServiceTotal = mainTotal + otherTotal + extraTotal;
      const serviceFee = serviceMode === "tenPercent" ? Math.round(beforeServiceTotal * 0.1) : 0;
      const grandTotal = beforeServiceTotal + serviceFee;
      const balance = grandTotal - deposit;
      const dateText = `${toDateText(getValue("eventDate"))}(${weekdayText(getValue("eventDate"))}) ${getValue("mealPeriod")}`;
      const title = `新莊典華 ${getValue("hall")} ${dateText} ${getValue("eventType")} ${getValue("clientName")}`;
      const extras = extraRows.map(item => {
        const subtotal = Number(item.price || 0) * Number(item.qty || 0);
        const suffix = subtotal > 0 && !item.comp ? `：${formatMoney(subtotal)}` : item.comp ? "：招待" : "";
        return `<div class="note-line">● ${item.name}${suffix}</div>`;
      }).join("") || `<div class="note-line empty-state">尚未輸入其他加購</div>`;

      const serviceRow = serviceFee > 0
        ? `<tr><td class="subtotal-label" colspan="3">服務費</td><td class="right">${formatMoney(serviceFee)}</td></tr>`
        : "";

      body.innerHTML = `
        <tr>
          <td class="sheet-title" colspan="5">${title}</td>
        </tr>
        <tr>
          <td class="head side"></td>
          <td class="head">品項</td>
          <td class="head">單價(含稅)</td>
          <td class="head">保證數量</td>
          <td class="head">小計</td>
        </tr>
        ${sectionRows("餐飲服務", mainRows, "尚未輸入餐飲服務項目", true)}
        ${getValue("showOtherFees") ? sectionRows("其他費用", otherRows, "尚未輸入其他費用項目") : ""}
        <tr>
          <td class="side" rowspan="${serviceFee > 0 ? 5 : 4}">費用試算</td>
          <td class="subtotal-label" colspan="3">總計</td>
          <td class="right">${formatMoney(beforeServiceTotal)}</td>
        </tr>
        ${serviceRow}
        <tr>
          <td class="subtotal-label" colspan="3">定金已支付</td>
          <td class="right">${formatMoney(deposit)}</td>
        </tr>
        <tr>
          <td class="subtotal-label" colspan="3">尾款總計</td>
          <td class="right"><strong>${formatMoney(balance)}</strong></td>
        </tr>
        <tr>
          <td class="red center" colspan="4">付款方式：${paymentOptions()}</td>
        </tr>
        <tr>
          <td colspan="5">其他加購：</td>
        </tr>
        <tr>
          <td colspan="5" style="padding:0;border-bottom:0">${extras}</td>
        </tr>
        <tr>
          <td colspan="5" class="signature" style="padding:0">
            <div class="signature-grid">
              <div class="signature-left red">${getValue("footerNote").replace(/\n/g, "<br>")}</div>
              <div class="signature-right red">
                賓客確認：
                <span class="date-mark">年月日</span>
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    function clearForNewEntry() {
      state = cloneState(EMPTY_STATE);
      setValue("eventType", "");
      setValue("eventDate", "");
      setValue("mealPeriod", "");
      setValue("hall", "");
      setValue("clientName", "");
      setValue("branch", "新莊典華");
      setValue("deposit", 0);
      setValue("serviceMode", "included");
      setValue("showOtherFees", true);
      setValue("notice", "");
      setValue("footerNote", "");
      document.querySelectorAll('input[name="payment"]').forEach(input => {
        input.checked = false;
      });
      renderEditors();
      renderSheet();
      saveDraft();
    }

    function saveDraft() {
      const draft = {
        state,
        fields: {},
        payments: Array.from(document.querySelectorAll('input[name="payment"]:checked')).map(input => input.value)
      };
      fields.forEach(id => draft.fields[id] = getValue(id));
      localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
    }

    function loadDraft() {
      const raw = localStorage.getItem(DRAFT_KEY);
      if (!raw) return;
      try {
        const draft = JSON.parse(raw);
        if (draft.state?.main) state.main = draft.state.main;
        if (draft.state?.other) state.other = draft.state.other;
        if (draft.state?.extra) state.extra = draft.state.extra;
        if (!draft.state?.other) {
          const otherNames = ["場租", "舞臺", "舞台"];
          state.other = state.main.filter(item => otherNames.includes(item.name));
          state.main = state.main.filter(item => !otherNames.includes(item.name));
          if (!state.other.length) {
            state.other = [
              { name: "場租", price: 0, qty: 0 },
              { name: "舞臺", price: 3150, qty: 1 }
            ];
          }
        }
        fields.forEach(id => {
          if (draft.fields?.[id] !== undefined) setValue(id, draft.fields[id]);
        });
        setValue("branch", "新莊典華");
        if (draft.payments) {
          document.querySelectorAll('input[name="payment"]').forEach(input => {
            input.checked = draft.payments.includes(input.value);
          });
        }
      } catch {
        localStorage.removeItem(DRAFT_KEY);
      }
    }

    document.addEventListener("input", event => {
      const input = event.target;
      const { type, index, key } = input.dataset;
      if (type && key) {
        state[type][Number(index)][key] = key === "name" ? input.value : key === "comp" ? input.checked : Number(input.value || 0);
      }
      renderSheet();
      saveDraft();
    });

    document.addEventListener("change", () => {
      renderSheet();
      saveDraft();
    });

    document.addEventListener("click", event => {
      const addType = event.target.dataset.add;
      const removeType = event.target.dataset.remove;

      if (addType) {
        state[addType].push({ name: "", price: 0, qty: 0, comp: false });
        renderEditors();
        renderSheet();
        saveDraft();
      }

      if (removeType) {
        state[removeType].splice(Number(event.target.dataset.index), 1);
        renderEditors();
        renderSheet();
        saveDraft();
      }
    });

    document.getElementById("printBtn").addEventListener("click", () => window.print());
    document.getElementById("resetBtn").addEventListener("click", () => {
      localStorage.removeItem("dianhuaBalanceDraft");
      localStorage.removeItem(DRAFT_KEY);
      clearForNewEntry();
    });

    loadDraft();
    renderEditors();
    renderSheet();
  </script>
</body>
</html>
